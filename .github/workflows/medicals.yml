name: Build & Package PharmacyERP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PROJECT_PATH: ./WebUI/WebUI.csproj
  APP_NAME: PharmacyERP

jobs:

  # 🧱 JOB 1 — BUILD APPLICATION
  build-app:
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Version
        id: version
        run: |
          $version = "1.0.${{ github.run_number }}"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./global.json
          cache: true

      - name: Restore
        run: dotnet restore $env:PROJECT_PATH

      - name: Publish EXE
        run: |
          dotnet publish $env:PROJECT_PATH `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -p:PublishTrimmed=false `
            -p:Version=${{ steps.version.outputs.version }} `
            -o publish_output

      - name: Rename EXE
        run: |
          Get-ChildItem publish_output -Filter *.exe | Rename-Item -NewName "$env:APP_NAME.exe"

      - name: Zip App
        run: |
          Compress-Archive -Path publish_output\* -DestinationPath "$env:APP_NAME-win-x64.zip"

      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: ${{ env.APP_NAME }}-win-x64.zip
          retention-days: 7

  # 🧱 JOB 2 — BUILD INSTALLER
  build-installer:
    runs-on: windows-latest
    needs: build-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download App Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package

      - name: Extract App
        run: |
          Expand-Archive ${{ env.APP_NAME }}-win-x64.zip -DestinationPath installer/app

      - name: Download PostgreSQL Installer
        run: |
          mkdir installer\postgresql
          powershell -Command "Invoke-WebRequest -Uri https://get.enterprisedb.com/postgresql/postgresql-16.2-1-windows-x64.exe -OutFile installer\postgresql\postgresql-installer.exe"

      - name: Verify installer inputs
        run: |
          echo "=== INSTALLER ROOT ==="
          dir installer
          echo "=== APP FILES ==="
          dir installer\app
          echo "=== SCRIPTS ==="
          dir installer\scripts
          echo "=== POSTGRES ==="
          dir installer\postgresql
          
      - name: Validate required files
        run: |
          if (!(Test-Path "installer\setup.iss")) { exit 1 }
          if (!(Test-Path "installer\scripts\init-db.sql")) { exit 1 }
          if (!(Test-Path "installer\app")) { exit 1 }
          if (!(Test-Path "installer\postgresql\postgresql-installer.exe")) { exit 1 }

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        run: |
          iscc installer\setup.iss /DMyAppVersion=${{ needs.build-app.outputs.version }}

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-package
          path: installer/output/*.exe
          retention-days: 7

  # 🚀 JOB 3 — CREATE RELEASE (OPTIONAL BUT RECOMMENDED)
  release:
    runs-on: windows-latest
    needs: [build-app, build-installer]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download App Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package

      - name: Download Installer Artifact
        uses: actions/download-artifact@v4
        with:
          name: installer-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: PharmacyERP v1.0.${{ github.run_number }}
          files: |
            *.zip
            *.exe