name: Build & Package PharmacyERP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PROJECT_PATH: ./Shsmg.Pharma.WebUI/Shsmg.Pharma.WebUI.csproj
  APP_NAME: PharmacyERP

jobs:

  build-app:
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set Version
        id: version
        run: |
          $version = "1.0.${{ github.run_number }}"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./global.json

      - name: Restore
        run: dotnet restore $env:PROJECT_PATH

      - name: Publish
        run: |
          dotnet publish $env:PROJECT_PATH `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -p:PublishTrimmed=false `
            -p:Version=${{ steps.version.outputs.version }} `
            -o publish_output

      - name: Rename EXE
        shell: pwsh
        run: |
              $exe = Get-ChildItem publish_output -Filter *.exe
              if ($exe.Count -eq 0) { throw "No EXE found after publish" }
              Rename-Item $exe[0].FullName "$env:APP_NAME.exe"

      - name: Zip
        shell: pwsh
        run: |
          Compress-Archive -Path publish_output\* -DestinationPath "$env:APP_NAME-win-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: ${{ env.APP_NAME }}-win-x64.zip


  build-installer:
    runs-on: windows-latest
    needs: build-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: app-package

      - name: Extract App
        shell: pwsh
        run: |
          mkdir installer/app
          Expand-Archive ${{ env.APP_NAME }}-win-x64.zip -DestinationPath installer/app -Force

      - name: Download PostgreSQL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer/postgresql
          Invoke-WebRequest -Uri https://get.enterprisedb.com/postgresql/postgresql-16.2-1-windows-x64.exe -OutFile installer/postgresql/postgresql-installer.exe

      - name: Validate Inputs
        shell: pwsh
        run: |
          if (!(Test-Path "installer/setup.iss")) { throw "Missing setup.iss" }
          if (!(Test-Path "installer/scripts/init-db.sql")) { throw "Missing SQL" }
          if (!(Test-Path "installer/app")) { throw "Missing app" }
          if (!(Test-Path "installer/postgresql/postgresql-installer.exe")) { throw "Missing postgres" }

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Verify installer output
        shell: pwsh
        run: |
          if (!(Test-Path "installer/output")) { throw "Installer output missing" }

      - name: Build Installer
        run: |
          iscc installer/setup.iss /DMyAppVersion=${{ needs.build-app.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: installer-package
          path: installer/output/*.exe


  release:
    runs-on: windows-latest
    needs: [build-app, build-installer]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-package

      - uses: actions/download-artifact@v4
        with:
          name: installer-package

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-app.outputs.version }}
          name: PharmacyERP v${{ needs.build-app.outputs.version }}
          files: |
            PharmacyERP-win-x64.zip
            *.exe