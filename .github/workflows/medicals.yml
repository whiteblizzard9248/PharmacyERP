name: Build Self-Contained Windows App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.106'
          # This enables built-in caching for NuGet packages
          cache: true
          cache-dependency-path: '**/*.csproj' # or '**/packages.lock.json'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Publish for Windows
        # -r win-x64: Targets Windows 64-bit
        # --self-contained: Includes the .NET 10 runtime in the folder
        # -p:PublishSingleFile: Merges logic into one .exe
        run: >
          dotnet publish -c Release 
          -r win-x64 
          --self-contained true 
          -p:PublishSingleFile=true 
          -p:PublishReadyToRun=true 
          -o ./publish_output

      - name: Zip Release Bundle
        # Uses standard Linux 'zip' utility to package the output folder
        run: zip -r medicals.zip ./publish_output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-production-build
          path: medicals.zip
          retention-days: 7
