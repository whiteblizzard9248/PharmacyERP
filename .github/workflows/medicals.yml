name: Build OnPremise Pharma

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PROJECT_PATH: ./src/WebUI/WebUI.csproj   # 🔴 Change this to your entry project
      OUTPUT_NAME: shpharma

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # adjust if needed
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore Dependencies
        run: dotnet restore $PROJECT_PATH

      - name: Publish Windows Executable
        run: |
          dotnet publish $PROJECT_PATH \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:PublishReadyToRun=true \
            -p:PublishTrimmed=true \
            -p:TrimMode=link \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o ./publish_output

      - name: Rename Executable
        run: |
          cd publish_output
          ls
          # Rename generated exe to a clean name
          find . -type f -name "*.exe" -exec mv {} $OUTPUT_NAME.exe \;

      - name: Zip Release Bundle
        run: |
          cd publish_output
          zip -r ../${{ env.OUTPUT_NAME }}.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-production-build
          path: ${{ env.OUTPUT_NAME }}.zip
          retention-days: 7